<div class="employee-page">
  <div class="employee-container">

    <div class="page-header">
      <div>
        <p class="page-label">Our Team</p>
        <h1>Team Directory</h1>
        <p class="page-subtext">
          Meet the people who make our coffee house run every day.
        </p>
      </div>
    </div>

    <div *ngIf="loading" class="loading-message">
      Loading team members...
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div *ngIf="!loading && employees.length === 0" class="empty-state">
      No team members found.
    </div>

    <div class="card-grid" *ngIf="!loading && employees.length > 0">
      <div class="team-card" *ngFor="let emp of employees">
        <div class="team-name">
          {{ emp.firstName }} {{ emp.lastName }}
        </div>
        <div class="team-position">
          {{ emp.position }}
        </div>
        <div class="team-department">
          {{ emp.department }}
        </div>
        <div class="team-email">
          {{ emp.email }}
        </div>
      </div>
    </div>

  </div>
</div>

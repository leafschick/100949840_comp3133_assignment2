<div class="portal-page">
  <section class="hero-banner">
    <div class="hero-content">
      <p class="hero-label">Forms</p>
      <h1>Time-Off Request</h1>
      <p class="hero-subtext">
        Submit a request for vacation, personal time, or other time away from work.
      </p>
    </div>
  </section>

  <section class="resource-section">
    <div class="form-container">
      <label class="form-label">Employee Name</label>
      <input
        type="text"
        class="form-input"
        placeholder="Enter employee name"
        [(ngModel)]="form.employeeName"
        name="employeeName"
      />

      <label class="form-label">Start Date</label>
      <input
        type="date"
        class="form-input"
        [(ngModel)]="form.startDate"
        name="startDate"
      />

      <label class="form-label">End Date</label>
      <input
        type="date"
        class="form-input"
        [(ngModel)]="form.endDate"
        name="endDate"
      />

      <label class="form-label">Reason</label>
      <textarea
        class="form-input form-textarea"
        placeholder="Enter reason for time-off request"
        [(ngModel)]="form.reason"
        name="reason"
      ></textarea>

      <button class="submit-btn" (click)="submitForm()">Submit</button>

      <p *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
      </p>

    </div>
  </section>
</div>

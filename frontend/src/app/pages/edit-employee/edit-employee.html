<div class="edit-page">
  <header class="topbar">
    <div class="brand">Coffee House</div>

    <nav class="topnav">
      <a routerLink="/">Home</a>
      <a routerLink="/employees">Employees</a>
      <a routerLink="/add-employee">Add Employee</a>
      <a routerLink="/login">Logout</a>
    </nav>
  </header>

  <div class="edit-container">
    <div class="page-header">
      <div>
        <p class="page-label">Employee Management</p>
        <h1>Edit Employee</h1>
        <p class="page-subtext">
          Update the employee details below and save the changes to the record.
        </p>
      </div>
    </div>

    <p class="loading-message" *ngIf="loading">Loading employee data...</p>
    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="form-card" *ngIf="!loading">
      <form (ngSubmit)="updateEmployee()">
        <div class="form-grid">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" />
          </div>

          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" />
          </div>

          <div class="form-group full-width">
            <label for="email">Email Address</label>
            <input id="email" type="email" [(ngModel)]="email" name="email" />
          </div>

          <div class="form-group">
            <label for="department">Department</label>
            <input id="department" type="text" [(ngModel)]="department" name="department" />
          </div>

          <div class="form-group">
            <label for="position">Position</label>
            <input id="position" type="text" [(ngModel)]="position" name="position" />
          </div>

          <div class="form-group full-width">
            <label for="image">Profile Picture</label>
            <input id="image" type="text" placeholder="Enter image URL" [(ngModel)]="image" name="image" />
          </div>
        </div>

        <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

        <div class="button-row">
          <a routerLink="/employees" class="cancel-btn">Cancel</a>
          <button type="submit" class="update-btn">Update Employee</button>
        </div>
      </form>
    </div>
  </div>
</div>
